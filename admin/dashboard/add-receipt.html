          <div class="user-content">

              <div class="">
                <h2>Add New Receipt</h2>

                <p id="formMsg" style="margin-top:10px; display:none; padding:10px; border-radius:4px;"></p>

                <form id="receiptForm">
                  <div class="row">

                    <!-- PAYER -->
                    <div class="col-md-12">
                      <h4>Payer Information</h4>
                      <div class="input-item input-with-label">
                        <label class="input-item-label">Payer Name</label>
                        <input class="input-bordered" type="text" name="payer-name" />
                      </div>
                      <div class="input-item input-with-label">
                        <label class="input-item-label">Payer Phone</label>
                        <input class="input-bordered" type="text" name="payer-phone" />
                      </div>
                      <div class="input-item input-with-label">
                        <label class="input-item-label">Payer Address</label>
                        <input class="input-bordered" type="text" name="payer-address" />
                      </div>
                      <div class="input-item input-with-label">
                        <label class="input-item-label">Payer City</label>
                        <input class="input-bordered" type="text" name="payer-city" />
                      </div>
                      <div class="input-item input-with-label">
                        <label class="input-item-label">Payer State/Province</label>
                        <input class="input-bordered" type="text" name="payer-state" />
                      </div>
                      <div class="input-item input-with-label">
                        <label class="input-item-label">Payer Country</label>
                        <input class="input-bordered" type="text" name="payer-country" />
                      </div>
                      <div class="input-item input-with-label">
                        <label class="input-item-label">Payer Zip Code</label>
                        <input class="input-bordered" type="text" name="payer-zip" />
                      </div>
                      <div class="input-item input-with-label">
                        <label class="input-item-label">Payer Email</label>
                        <input class="input-bordered" type="email" name="payer-email" />
                      </div>
                    </div>

                    <!-- PRODUCT -->
                    <div class="col-md-12">
                      <h4>Product Information</h4>
                      <div class="input-item input-with-label">
                        <label class="input-item-label">Product Name</label>
                        <input class="input-bordered" type="text" name="name" />
                      </div>
                      <div class="input-item input-with-label">
                        <label class="input-item-label">Date</label>
                        <input class="input-bordered" type="date" name="date" />
                      </div>
                      <div class="input-item input-with-label">
                        <label class="input-item-label">Price</label>
                        <input class="input-bordered" type="text" name="price" />
                      </div>
                      <div class="input-item input-with-label">
                        <label class="input-item-label">Product Description</label>
                        <textarea class="input-bordered" name="description" rows="3"></textarea>
                      </div>
                    </div>

                    <!-- AGENT -->
                    <div class="col-md-12">
                      <h4>Agent Information</h4>
                      <div class="input-item input-with-label">
                        <label class="input-item-label">Agent Name</label>
                        <input class="input-bordered" type="text" name="agent-name" />
                      </div>
                      <div class="input-item input-with-label">
                        <label class="input-item-label">Agent Phone</label>
                        <input class="input-bordered" type="text" name="agent-phone" />
                      </div>

                      <div class="gaps-1x"></div>
                      <div class="d-sm-flex justify-content-between align-items-center">
                        <button type="button" id="submitBtn" class="btn btn-primary">Proceed</button>
                      </div>
                    </div>

                  </div>
                </form>

    <script src="assets/js/jquery.bundle.js?ver=101"></script>
    <script src="assets/js/script.js?ver=101"></script>
    <script>
      // Logout
      document.querySelectorAll("#logoutBtn, #logoutBtn2").forEach((btn) => {
        btn.addEventListener("click", async function (e) {
          e.preventDefault();
          await fetch("/api/admin/auth/logout", { method: "POST", credentials: "include" });
          window.location.href = "/admin/auth/login.html";
        });
      });

      document.getElementById("submitBtn").addEventListener("click", async function () {
        const btn = this;
        const msg = document.getElementById("formMsg");
        msg.style.display = "none";

        const form = document.getElementById("receiptForm");
        const get = (name) => form.querySelector(`[name="${name}"]`)?.value || "";

        const payload = {
          payerName: get("payer-name"),
          payerPhone: get("payer-phone"),
          payerAddress: get("payer-address"),
          payerCity: get("payer-city"),
          payerState: get("payer-state"),
          payerCountry: get("payer-country"),
          payerZip: get("payer-zip"),
          payerEmail: get("payer-email"),
          productName: get("name"),
          date: get("date"),
          price: get("price"),
          description: get("description"),
          agentName: get("agent-name"),
          agentPhone: get("agent-phone"),
        };

        btn.disabled = true;
        btn.textContent = "Saving...";

        try {
          const res = await fetch("/api/admin/receipts", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify(payload),
          });

          const data = await res.json();

          if (data.ok) {
            window.location.href = "receipts.html";
          } else {
            msg.style.color = "red";
            msg.style.background = "#fff0f0";
            msg.textContent = data.message || "Failed. Try again.";
            msg.style.display = "block";
          }
        } catch (err) {
          msg.style.color = "red";
          msg.style.background = "#fff0f0";
          msg.textContent = "Network error. Please try again.";
          msg.style.display = "block";
        } finally {
          btn.disabled = false;
          btn.textContent = "Proceed";
        }
      });
    </script>

    <script src="/admin-script/checkAuth.js"></script>
