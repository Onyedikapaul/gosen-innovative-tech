    <script>
      // Logout
      document.querySelectorAll("#logoutBtn, #logoutBtn2").forEach((btn) => {
        btn.addEventListener("click", async function (e) {
          e.preventDefault();
          await fetch("/api/admin/auth/logout", {
            method: "POST",
            credentials: "include",
          });
          window.location.href = "/admin/auth/login.html";
        });
      });

      // Submit consignment
      document
        .getElementById("submitBtn")
        .addEventListener("click", async function () {
          const btn = this;
          const msg = document.getElementById("formMsg");
          msg.style.display = "none";

          const form = document.getElementById("consignmentForm");
          const get = (name) =>
            form.querySelector(`[name="${name}"]`)?.value || "";

          const payload = {
            senderName: get("sender-name"),
            senderPhone: get("sender-phone"),
            senderCompany: get("sender-company"),
            senderAddress: get("sender-address"),
            senderCity: get("sender-city"),
            senderState: get("sender-state"),
            senderCountry: get("sender-country"),
            senderZip: get("sender-zip"),
            senderEmail: get("sender-email"),

            receiverName: get("receiver-name"),
            receiverPhone: get("receiver-phone"),
            receiverCompany: get("receiver-company"),
            receiverAddress: get("receiver-address"),
            receiverCity: get("receiver-city"),
            receiverState: get("receiver-state"),
            receiverCountry: get("receiver-country"),
            receiverZip: get("receiver-zip"),
            receiverEmail: get("receiver-email"),

            productName: get("name"),
            departure: get("product-departure"),
            arrival: get("product-arrival"),
            price: get("price"),
            description: get("description"),
            location: get("location"),
            status: get("status"),
          };

          btn.disabled = true;
          btn.textContent = "Saving...";

          try {
            const res = await fetch("/api/admin/consignments", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "include",
              body: JSON.stringify(payload),
            });

            const data = await res.json();

            if (data.ok) {
              window.location.href = "consignments.html";
            } else {
              msg.style.color = "red";
              msg.style.background = "#fff0f0";
              msg.textContent = data.message || "Failed. Try again.";
              msg.style.display = "block";
            }
          } catch (err) {
            msg.style.color = "red";
            msg.style.background = "#fff0f0";
            msg.textContent = "Network error. Please try again.";
            msg.style.display = "block";
          } finally {
            btn.disabled = false;
            btn.textContent = "Proceed";
          }
        });
    </script>
